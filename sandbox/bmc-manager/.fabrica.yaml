project:
    name: bmc-manager
    module: github.com/example/bmc-manager
    created: 2026-04-28T09:29:12.513281-07:00
features:
    validation:
        enabled: true
        mode: strict
    events:
        enabled: true
        bus_type: memory
    conditional:
        enabled: true
        etag_algorithm: sha256
    auth:
        enabled: false
    storage:
        enabled: true
        type: ent
        db_driver: sqlite3
    reconciliation:
        enabled: true
        worker_count: 5
        requeue_delay: 5
generation:
    handlers: true
    storage: true
    client: true
    openapi: true
    events: true
    middleware: true
    reconciliation: true
